<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drawing App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0b000f 0%, #600ab6 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: rgb(10, 0, 15);
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 20px;
            max-width: 900px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #ffd20c;
            margin-bottom: 20px;
            font-size: 28px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
        }

        .color-label {
            font-weight: 600;
            color: #ffd20c;
            margin-right: 10px;
        }


        .button-group {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #ea66ea;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        button:hover {
            background: #aa66ea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        #saveBtn {
            background: #ffa318;
        }

        #saveBtn:hover {
            background: #71c90c;
        }

        #gallery {
            margin-top: 30px;
        }

        #gallery h2 {
            text-align: center;
            color: #ffd20c;
            margin-bottom: 15px;
            font-size: 22px;
        }

        .gallery-items {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
        }

        .gallery-item {
            position: relative;
            border: 1px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
            width: 150px;
            height: 150px;
            background: white; /* make sure images have white background */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-item .delete-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255, 0, 0, 0.8);
            border: none;
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .gallery-item .delete-btn:hover {
            background: rgba(255, 0, 0, 1);
        }

        #canvas {
            border: 2px solid #ddd;
            border-radius: 8px;
            display: block;
            background: white;
            cursor: crosshair;
            width: 100%;
            height: auto;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="range"] {
            width: 100px;
            cursor: pointer;
        }

        .brush-label {
            font-weight: 600;
            color: #ffd20c;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .controls {
                flex-direction: column;
            }

            .button-group {
                margin-left: 0;
                width: 100%;
            }

            button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Drawing App</h1>
        
        <div class="controls">
            <div class="color-control">
                <label for="colorPicker" class="color-label">Color:</label>
                <input type="color" id="colorPicker" value="#000000">
                <label for="alphaRange" class="color-label">Transparency:</label>
                <input type="range" id="alphaRange" min="0" max="1" step="0.01" value="1">
                <span id="alphaDisplay" style="color: #ffd20c; font-weight: 600;">100%</span>
            </div>

            <div class="slider-group">
                <span class="brush-label">Brush Size:</span>
                <input type="range" id="brushSize" min="1" max="50" value="5">
                <span id="sizeDisplay" style="color: #ffd20c; font-weight: 600;">5px</span>
            </div>

            <div class="button-group">
                <button id="undoBtn">Undo</button>
                <button id="redoBtn">Redo</button>
                <button id="clearBtn">Clear Canvas</button>
                <button id="downloadBtn">Download</button>
                <button id="saveBtn">Save to Gallery</button>
                <button id="clearGalleryBtn">Clear Gallery</button>
            </div>
        </div>

        <canvas id="canvas"></canvas>
        <div id="gallery" class="gallery">
            <h2>Gallery</h2>
            <div id="galleryItems" class="gallery-items"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const brushSizeSlider = document.getElementById('brushSize');
        const sizeDisplay = document.getElementById('sizeDisplay');
        const clearBtn = document.getElementById('clearBtn');
        const colorPicker = document.getElementById('colorPicker');
        const alphaRange = document.getElementById('alphaRange');
        const alphaDisplay = document.getElementById('alphaDisplay');
        const downloadBtn = document.getElementById('downloadBtn');
        const undoBtn = document.getElementById('undoBtn');
        const redoBtn = document.getElementById('redoBtn');
        const clearGalleryBtn = document.getElementById('clearGalleryBtn');

        let isDrawing = false;
        let currentColor = '#000000';
        let currentAlpha = 1;
        let brushSize = 5;

        // history stacks for undo/redo
        const history = [];
        const redoStack = [];

        function saveState() {
            history.push(canvas.toDataURL());
            if (history.length > 50) history.shift();
            // clear redo whenever a new action happens
            redoStack.length = 0;
        }

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = Math.min(container.clientWidth - 4, 800);
            canvas.height = 600;
        }

        resizeCanvas();
        // save initial blank state for undo
        saveState();
        window.addEventListener('resize', resizeCanvas);


        // Brush size control
        brushSizeSlider.addEventListener('input', (e) => {
            brushSize = e.target.value;
            sizeDisplay.textContent = brushSize + 'px';
        });

        // Color and transparency control
        colorPicker.addEventListener('input', (e) => {
            currentColor = e.target.value;
        });

        alphaRange.addEventListener('input', (e) => {
            currentAlpha = e.target.value;
            alphaDisplay.textContent = Math.round(currentAlpha * 100) + '%';
        });

        // helper to convert hex color to rgba string
        function hexToRgba(hex, a) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r},${g},${b},${a})`;
        }

        // Drawing functions
        function startDrawing(e) {
            // record current state before new stroke
            saveState();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function draw(e) {
            if (!isDrawing) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColor, currentAlpha);
            ctx.lineTo(x, y);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
            ctx.closePath();
        }

        // Touch support for mobile
        function getTouchPos(e) {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            return {
                x: touch.clientX - rect.left,
                y: touch.clientY - rect.top
            };
        }

        function startDrawingTouch(e) {
            // record current state before new touch stroke
            saveState();
            isDrawing = true;
            const pos = getTouchPos(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            e.preventDefault();
        }

        function drawTouch(e) {
            if (!isDrawing) return;
            const pos = getTouchPos(e);

            ctx.lineWidth = brushSize;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = hexToRgba(currentColor, currentAlpha);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        }

        function stopDrawingTouch() {
            isDrawing = false;
            ctx.closePath();
        }

        // Mouse events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch events
        canvas.addEventListener('touchstart', startDrawingTouch);
        canvas.addEventListener('touchmove', drawTouch);
        canvas.addEventListener('touchend', stopDrawingTouch);

        // Clear canvas
        clearBtn.addEventListener('click', () => {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        });

        // Download canvas
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.href = canvas.toDataURL();
            link.download = 'drawing.png';
            link.click();
        });

        // Undo/Redo functions and input handling
        function undo() {
            if (history.length) {
                redoStack.push(canvas.toDataURL());
                const dataURL = history.pop();
                loadImageToCanvas(dataURL);
            }
        }

        function redo() {
            if (redoStack.length) {
                history.push(canvas.toDataURL());
                const dataURL = redoStack.pop();
                loadImageToCanvas(dataURL);
            }
        }

        undoBtn.addEventListener('click', undo);
        redoBtn.addEventListener('click', redo);

        document.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (e.ctrlKey && k === 'z') {
                e.preventDefault();
                undo();
            } else if (e.ctrlKey && (k === 'y' || (e.shiftKey && k === 'z'))) {
                e.preventDefault();
                redo();
            }
        });

        // Gallery functionality
        const saveBtn = document.getElementById('saveBtn');
        const galleryItems = document.getElementById('galleryItems');

        clearGalleryBtn.addEventListener('click', () => {
            galleryItems.innerHTML = '';
            localStorage.removeItem('galleryImages');
        });

        // helper to export current canvas on white background
        function getWhiteBackgroundDataURL() {
            const temp = document.createElement('canvas');
            temp.width = canvas.width;
            temp.height = canvas.height;
            const tctx = temp.getContext('2d');
            // fill white
            tctx.fillStyle = '#fff';
            tctx.fillRect(0, 0, temp.width, temp.height);
            // draw existing canvas
            tctx.drawImage(canvas, 0, 0);
            return temp.toDataURL();
        }

        saveBtn.addEventListener('click', () => {
            const dataURL = getWhiteBackgroundDataURL();
            addGalleryItem(dataURL);
            storeGallery();
        });

        function addGalleryItem(src) {
            const wrapper = document.createElement('div');
            wrapper.className = 'gallery-item';
            const img = document.createElement('img');
            img.src = src;
            // clicking an image loads it into the canvas for editing
            img.addEventListener('click', () => {
                saveState();
                loadImageToCanvas(src);
            });
            const delBtn = document.createElement('button');
            delBtn.className = 'delete-btn';
            delBtn.textContent = '✕';
            delBtn.addEventListener('click', () => {
                wrapper.remove();
                storeGallery();
            });
            wrapper.appendChild(img);
            wrapper.appendChild(delBtn);
            galleryItems.appendChild(wrapper);
        }

        function loadImageToCanvas(src) {
            const img = new Image();
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            };
            img.src = src;
        }

        function storeGallery() {
            const items = [];
            galleryItems.querySelectorAll('img').forEach(img => items.push(img.src));
            localStorage.setItem('galleryImages', JSON.stringify(items));
        }

        function loadGallery() {
            const items = JSON.parse(localStorage.getItem('galleryImages') || '[]');
            items.forEach(src => addGalleryItem(src));
        }

        loadGallery();
    </script>
</body>
</html>
